<!doctype html><html><head><meta charset="utf-8"><title>Room Tracer</title>
<style>
body{font:14px -apple-system,Arial;margin:0;display:flex;height:100vh}
#side{width:280px;padding:14px;box-sizing:border-box;background:#f5f5f7;overflow:auto;border-right:1px solid #ddd}
#wrap{flex:1;overflow:auto;background:#333;display:flex;align-items:flex-start;justify-content:center}
canvas{cursor:crosshair;background:#fff;margin:12px}
h2{margin:.2em 0}.cur{font-size:20px;font-weight:700;color:#0a62d0}
button{font:13px -apple-system;margin:2px 0;padding:6px 8px;width:100%;border-radius:7px;border:1px solid #c7c7cc;background:#fff;cursor:pointer}
button.p{background:#0a62d0;color:#fff;border-color:#0a62d0}
ol{padding-left:20px}li{cursor:pointer;padding:2px 0}li.done{color:#1a8f3a}li.active{font-weight:700;color:#0a62d0}
textarea{width:100%;height:120px;font:11px monospace}
small{color:#666}
</style></head><body>
<div id="side">
<h2>Room border tracer</h2>
<small>Click each <b>corner</b> of the current room, going around. The shape closes automatically. Then pick the next room.</small>
<p>Tracing: <span class="cur" id="cur"></span><br><small id="prog"></small></p>
<button class="p" id="next">✓ Finish room &amp; go to next (N)</button>
<button id="undo">↶ Undo last point (Z)</button>
<button id="clear">✗ Clear this room</button>
<hr>
<ol id="list"></ol>
<hr>
<button id="export">⤓ Export coordinates</button>
<textarea id="out" placeholder="exported JSON appears here — copy it back to Claude"></textarea>
</div>

  x.lineWidth=act?3:1.5;x.strokeStyle=act?'#0a62d0':'#888';x.stroke();
  p.forEach(pt=>{x.beginPath();x.arc(pt[0]*c.width,pt[1]*c.height,act?5:3,0,7);x.fillStyle=act?'#0a62d0':'#999';x.fill();});
  if(p.length){const cx=p.reduce((a,b)=>a+b[0],0)/p.length*c.width,cy=p.reduce((a,b)=>a+b[1],0)/p.length*c.height;
   x.fillStyle='#111';x.font='bold 16px Arial';x.textAlign='center';x.fillText(r,cx,cy);}
 });}
c.addEventListener('click',e=>{const b=c.getBoundingClientRect();const nx=(e.clientX-b.left)/b.width,ny=(e.clientY-b.top)/b.height;polys[ROOMS[idx]].push([+nx.toFixed(4),+ny.toFixed(4)]);draw();upd();});
document.getElementById('next').onclick=()=>{if(idx<ROOMS.length-1)idx++;upd();draw();};
document.getElementById('undo').onclick=()=>{polys[ROOMS[idx]].pop();draw();upd();};
document.getElementById('clear').onclick=()=>{polys[ROOMS[idx]]=[];draw();upd();};
document.getElementById('export').onclick=()=>{const o=ROOMS.map(r=>({name:r,polygon:polys[r]}));document.getElementById('out').value=JSON.stringify(o,null,0);document.getElementById('out').select();};
document.addEventListener('keydown',e=>{if(e.key==='n'||e.key==='Enter'){if(idx<ROOMS.length-1)idx++;upd();draw();}if(e.key==='z'){polys[ROOMS[idx]].pop();draw();upd();}});
</script></body></html>
